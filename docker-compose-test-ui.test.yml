services:
  playwright:
    image: mcr.microsoft.com/playwright:v1.56.0-noble
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ipc: host
    environment:
      - HUSKY=0
    command: sh -c "npm ci && npx playwright test ./tests/ui.spec.ts"
volumes:
  node_modules:
