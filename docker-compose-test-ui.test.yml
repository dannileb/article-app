services:
  storybook:
    image: node:20
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - "6006:6006"
    command: sh -c "npm ci && npx http-server storybook-static -p 6006 -a 0.0.0.0"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:6006",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  playwright:
    image: mcr.microsoft.com/playwright:v1.55.1-noble
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      storybook:
        condition: service_healthy
    environment:
      - DOCKER=true
    ipc: host
    command: npx playwright test ./tests/ui.spec.ts --update-snapshots

volumes:
  node_modules:
